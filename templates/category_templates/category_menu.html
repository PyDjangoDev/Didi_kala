{% load mptt_tags %}

{% recursetree categories %}
    <li>
        <a href="#">
            <i class="mdi mdi-folder-outline"></i>
            {{ node.title }}
            {% if not node.is_leaf_node %}
                <i class="mdi mdi-chevron-left" style="float: left; font-size: 18px;"></i>
            {% endif %}
        </a>
        {% if not node.is_leaf_node %}
            <ul class="row">
                {{ children }}
            </ul>
        {% endif %}
    </li>
{% endrecursetree %}
